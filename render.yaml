services:
  - type: web
    name: pdf-excel-converter
    env: python
    region: oregon
    plan: free
    buildCommand: |
      apt-get update
      apt-get install -y poppler-utils tesseract-ocr libgl1 libglib2.0-0
      pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 600 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: WEB_CONCURRENCY
        value: 1
      - key: PORT
        value: 10000
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 1
